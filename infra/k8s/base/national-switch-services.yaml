apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispute-ml-scorer
  namespace: nexthub
  labels:
    app: dispute-ml-scorer
    tier: ml
    phase: "4"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dispute-ml-scorer
  template:
    metadata:
      labels:
        app: dispute-ml-scorer
    spec:
      serviceAccountName: nexthub-service
      containers:
        - name: dispute-ml-scorer
          image: nexthub/dispute-ml-scorer:latest
          ports:
            - containerPort: 8230
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: nexthub-redis-secret
                  key: url
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: nexthub-kafka-secret
                  key: brokers
            - name: WORKERS
              value: "4"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
