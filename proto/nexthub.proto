syntax = "proto3";

package nexthub.v1;

option java_package = "com.nexthub.grpc";
option java_multiple_files = true;

// ═══════════════════════════════════════════════════════════════════════════════
// NextHub Core gRPC Service
//
// This is the primary integration surface for DFSP clients (e.g. Paygate).
// All critical-path operations (transfers, quotes, FX, NDC checks) use gRPC
// for low latency and strong typing.
//
// Server: nexthub-core (port 50051)
// Client: paygate-dfsp (nexthubGrpcClient.ts)
// ═══════════════════════════════════════════════════════════════════════════════

// ─── Transfer Service ─────────────────────────────────────────────────────────
// Handles cross-border transfer initiation and status polling.
service TransferService {
  rpc InitiateTransfer   (TransferRequest)       returns (TransferResponse);
  rpc GetTransferStatus  (TransferStatusRequest) returns (TransferStatusResponse);
  rpc AbortTransfer      (AbortTransferRequest)  returns (AbortTransferResponse);
  rpc FulfilTransfer     (FulfilTransferRequest) returns (FulfilTransferResponse);
}

message TransferRequest {
  string transfer_id      = 1;  // UUID, generated by Paygate (idempotency key)
  string payer_fsp_id     = 2;
  string payee_fsp_id     = 3;
  string payer_party_id   = 4;
  string payee_party_id   = 5;
  int64  amount_kobo      = 6;
  string currency         = 7;  // ISO 4217 e.g. "NGN"
  string ilp_packet       = 8;  // Base64-encoded ILP packet
  string condition        = 9;  // SHA-256 hash of fulfilment
  int64  expiration_ms    = 10; // Unix ms timestamp
  map<string, string> metadata = 11;
}

message TransferResponse {
  string transfer_id          = 1;
  string state                = 2;  // RECEIVED | RESERVED | COMMITTED | ABORTED
  int64  scheme_fee_kobo      = 3;
  int64  interchange_fee_kobo = 4;
  double fx_rate              = 5;
  string error_code           = 6;
  string error_description    = 7;
  int64  created_at_ms        = 8;
}

message TransferStatusRequest {
  string transfer_id = 1;
}

message TransferStatusResponse {
  string transfer_id          = 1;
  string state                = 2;
  int64  amount_kobo          = 3;
  string currency             = 4;
  int64  scheme_fee_kobo      = 5;
  int64  interchange_fee_kobo = 6;
  string fulfilment           = 7;
  string error_code           = 8;
  string error_description    = 9;
  int64  created_at_ms        = 10;
  int64  updated_at_ms        = 11;
}

message AbortTransferRequest {
  string transfer_id       = 1;
  string error_code        = 2;
  string error_description = 3;
}

message AbortTransferResponse {
  bool   success    = 1;
  string state      = 2;
  string message    = 3;
}

message FulfilTransferRequest {
  string transfer_id = 1;
  string fulfilment  = 2;  // SHA-256 preimage
}

message FulfilTransferResponse {
  bool   success          = 1;
  string state            = 2;
  int64  scheme_fee_kobo  = 3;
  string message          = 4;
}

// ─── Quote Service ────────────────────────────────────────────────────────────
// Pre-transfer quote: calculates fees, FX rate, and net amount before committing.
service QuoteService {
  rpc RequestQuote  (QuoteRequest)  returns (QuoteResponse);
  rpc GetQuote      (GetQuoteRequest) returns (QuoteResponse);
}

message QuoteRequest {
  string quote_id         = 1;  // UUID, generated by Paygate
  string payer_fsp_id     = 2;
  string payee_fsp_id     = 3;
  string payer_party_id   = 4;
  string payee_party_id   = 5;
  int64  amount_kobo      = 6;
  string currency         = 7;
  string amount_type      = 8;  // SEND | RECEIVE
  map<string, string> fees_breakdown = 9;
}

message QuoteResponse {
  string quote_id              = 1;
  string state                 = 2;  // PENDING | ACCEPTED | EXPIRED | REJECTED
  int64  transfer_amount_kobo  = 3;
  int64  payee_receive_kobo    = 4;
  int64  scheme_fee_kobo       = 5;
  int64  interchange_fee_kobo  = 6;
  int64  fx_markup_kobo        = 7;
  double fx_rate               = 8;
  string ilp_packet            = 9;
  string condition             = 10;
  int64  expiry_ms             = 11;
  string error_code            = 12;
  string error_description     = 13;
}

message GetQuoteRequest {
  string quote_id = 1;
}

// ─── FX Rate Service ──────────────────────────────────────────────────────────
// Real-time FX rate lookup. Called by Paygate on cache miss.
// Normal flow: Paygate caches rates from the Kafka `nexthub.fx.rates.v1` topic.
service FxRateService {
  rpc GetLiveRate   (FxRateRequest)      returns (FxRateResponse);
  rpc GetRateHistory (FxHistoryRequest)  returns (FxHistoryResponse);
  rpc ListRates     (ListRatesRequest)   returns (ListRatesResponse);
}

message FxRateRequest {
  string source_currency = 1;
  string target_currency = 2;
}

message FxRateResponse {
  string source_currency = 1;
  string target_currency = 2;
  double mid_rate        = 3;
  double buy_rate        = 4;
  double sell_rate       = 5;
  double markup_bps      = 6;
  int64  valid_from_ms   = 7;
  int64  valid_to_ms     = 8;
  string provider        = 9;
  bool   is_stale        = 10;
}

message FxHistoryRequest {
  string source_currency = 1;
  string target_currency = 2;
  int64  from_ms         = 3;
  int64  to_ms           = 4;
  int32  max_points      = 5;
}

message FxHistoryResponse {
  repeated FxRatePoint points = 1;
}

message FxRatePoint {
  double mid_rate   = 1;
  int64  timestamp_ms = 2;
}

message ListRatesRequest {
  string base_currency = 1;  // Optional filter
}

message ListRatesResponse {
  repeated FxRateResponse rates = 1;
  int64 fetched_at_ms = 2;
}

// ─── NDC Limit Service ────────────────────────────────────────────────────────
// Net Debit Cap check — called by Paygate before initiating a transfer.
service NdcLimitService {
  rpc CheckNdcLimit   (NdcLimitRequest)   returns (NdcLimitResponse);
  rpc GetNdcPosition  (NdcPositionRequest) returns (NdcPositionResponse);
}

message NdcLimitRequest {
  string dfsp_id       = 1;
  int64  amount_kobo   = 2;
  string currency      = 3;
}

message NdcLimitResponse {
  bool   allowed           = 1;
  int64  current_position_kobo = 2;
  int64  ndc_limit_kobo    = 3;
  int64  available_kobo    = 4;
  string dfsp_id           = 5;
  string currency          = 6;
}

message NdcPositionRequest {
  string dfsp_id  = 1;
  string currency = 2;
}

message NdcPositionResponse {
  string dfsp_id               = 1;
  string currency              = 2;
  int64  current_position_kobo = 3;
  int64  ndc_limit_kobo        = 4;
  int64  available_kobo        = 5;
  double utilisation_pct       = 6;
  int64  last_updated_ms       = 7;
}

// ─── Participant Service ──────────────────────────────────────────────────────
// DFSP directory — called by Paygate to resolve party FSP routing.
service ParticipantService {
  rpc LookupParticipant  (ParticipantLookupRequest)  returns (ParticipantLookupResponse);
  rpc ListParticipants   (ListParticipantsRequest)   returns (ListParticipantsResponse);
}

message ParticipantLookupRequest {
  string dfsp_id = 1;
}

message ParticipantLookupResponse {
  bool   found       = 1;
  string dfsp_id     = 2;
  string dfsp_name   = 3;
  string dfsp_type   = 4;
  string country     = 5;
  string currency    = 6;
  string status      = 7;
  string callback_url = 8;
}

message ListParticipantsRequest {
  string status_filter = 1;  // ACTIVE | SUSPENDED | ALL
}

message ListParticipantsResponse {
  repeated ParticipantLookupResponse participants = 1;
  int32 total = 2;
}
