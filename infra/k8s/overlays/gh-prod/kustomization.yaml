---
# overlays/gh-prod/kustomization.yaml — Ghana Production Region (Accra)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nexthub-gh
resources:
  - ../../base/nexthub-core-deployment.yaml
  - ../../base/autoscaling.yaml
  - ../../base/kafka-ha.yaml
  - ../../base/postgres-ha.yaml
  - ../../base/redis-sentinel-ha.yaml
commonLabels:
  region: gh
  environment: production
  hub-tier: secondary
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: nexthub-core
configMapGenerator:
  - name: nexthub-region-config
    literals:
      - REGION=gh
      - REGION_NAME=Ghana
      - CURRENCY=GHS
      - TIMEZONE=Africa/Accra
      - NIBSS_ENABLED=false
      - MOJALOOP_SCHEME=GH
      - KAFKA_PARTITIONS=20
      - DB_POOL_SIZE=50
      - REGULATORY_JURISDICTION=BOG
      - CONTINENTAL_HUB=false
      - CROSS_BORDER_ENABLED=true
      - PRIMARY_HUB_URL=https://api.paygate.ng
