---
# kafka-ha.yaml — Kafka High-Availability Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Uses Strimzi Kafka Operator for Kubernetes-native Kafka management.
# Configured for continental scale: 3 brokers per region, 3 ZooKeeper nodes,
# replication factor 3, min ISR 2.
#
# Topic partition counts are sized for Nigeria's peak load:
#   - nexthub.transfers.v1: 60 partitions (1B tx/day = ~11,574 tx/s)
#   - nexthub.settlement.v1: 12 partitions
#   - nexthub.aml.v1: 30 partitions
#   - nexthub.dlq.v1: 6 partitions

apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: nexthub-kafka
  namespace: nexthub
spec:
  kafka:
    version: 3.7.0
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
      - name: external
        port: 9094
        type: loadbalancer
        tls: true
        authentication:
          type: scram-sha-512
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      # Performance tuning for high-throughput payment events
      num.network.threads: 8
      num.io.threads: 16
      socket.send.buffer.bytes: 102400
      socket.receive.buffer.bytes: 102400
      socket.request.max.bytes: 104857600
      log.retention.hours: 168          # 7 days
      log.segment.bytes: 1073741824     # 1 GB segments
      log.retention.check.interval.ms: 300000
      # Enable idempotent producer support
      enable.idempotence: true
      # Compression for storage efficiency
      compression.type: lz4
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: 500Gi
          class: ssd-regional    # regional SSD storage class
          deleteClaim: false
    resources:
      requests:
        memory: 4Gi
        cpu: "1"
      limits:
        memory: 8Gi
        cpu: "4"
    jvmOptions:
      -Xms: 2048m
      -Xmx: 4096m
    rack:
      topologyKey: topology.kubernetes.io/zone   # spread brokers across AZs
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics-config
          key: kafka-metrics-config.yml
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 100Gi
      class: ssd-regional
      deleteClaim: false
    resources:
      requests:
        memory: 1Gi
        cpu: "500m"
      limits:
        memory: 2Gi
        cpu: "1"
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
# ── Topic definitions ─────────────────────────────────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexthub-transfers-v1
  labels:
    strimzi.io/cluster: nexthub-kafka
spec:
  partitions: 60
  replicas: 3
  config:
    retention.ms: "604800000"     # 7 days
    min.insync.replicas: "2"
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexthub-settlement-v1
  labels:
    strimzi.io/cluster: nexthub-kafka
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: "2592000000"    # 30 days (regulatory requirement)
    min.insync.replicas: "2"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexthub-aml-v1
  labels:
    strimzi.io/cluster: nexthub-kafka
spec:
  partitions: 30
  replicas: 3
  config:
    retention.ms: "2592000000"    # 30 days
    min.insync.replicas: "2"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexthub-dlq-v1
  labels:
    strimzi.io/cluster: nexthub-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "2592000000"    # 30 days — DLQ needs long retention for replay
    min.insync.replicas: "2"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexthub-fx-rates-v1
  labels:
    strimzi.io/cluster: nexthub-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "86400000"      # 24 hours
    min.insync.replicas: "2"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexthub-participants-v1
  labels:
    strimzi.io/cluster: nexthub-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "2592000000"
    min.insync.replicas: "2"
