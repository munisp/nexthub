---
# nexthub-core-deployment.yaml
# Base Kubernetes deployment for the NextHub core Node.js service.
# Applied via Kustomize overlays per region (ng-prod, gh-prod, ke-prod, za-prod, eg-prod).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexthub-core
  labels:
    app: nexthub-core
    component: api
    tier: backend
spec:
  replicas: 3                     # overridden per region overlay
  selector:
    matchLabels:
      app: nexthub-core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0           # zero-downtime rolling deploy
  template:
    metadata:
      labels:
        app: nexthub-core
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [nexthub-core]
              topologyKey: kubernetes.io/hostname  # spread across nodes
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: nexthub-core
      terminationGracePeriodSeconds: 60   # allow in-flight requests to drain
      containers:
        - name: nexthub-core
          image: nexthub/core:latest      # overridden by CI/CD per region
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
            - name: grpc
              containerPort: 50051
            - name: metrics
              containerPort: 9090
          env:
            - name: NODE_ENV
              value: production
            - name: REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['topology.kubernetes.io/region']
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexthub-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: nexthub-secrets
                  key: redis-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: nexthub-secrets
                  key: kafka-bootstrap-servers
            - name: NIBSS_GATEWAY_URL
              valueFrom:
                secretKeyRef:
                  name: nexthub-secrets
                  key: nibss-gateway-url
            - name: NIBSS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nexthub-secrets
                  key: nibss-secret-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexthub-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]  # allow LB to drain
      serviceAccountName: nexthub-core
---
apiVersion: v1
kind: Service
metadata:
  name: nexthub-core
  labels:
    app: nexthub-core
spec:
  selector:
    app: nexthub-core
  ports:
    - name: http
      port: 80
      targetPort: 3000
    - name: grpc
      port: 50051
      targetPort: 50051
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexthub-core
  annotations:
    # AWS IRSA / GCP Workload Identity — set per-region overlay
    eks.amazonaws.com/role-arn: ""
