name: NextHub CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  RUST_VERSION: "1.78"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ─── TypeScript / Next.js ────────────────────────────────────────────────────
  typescript:
    name: TypeScript (tsc + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm eslint . --max-warnings 0 || true

  # ─── Go bridge ───────────────────────────────────────────────────────────────
  go:
    name: Go (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/bridge/go.sum

      - name: Build bridge
        working-directory: services/bridge
        run: go build ./...

      - name: Vet
        working-directory: services/bridge
        run: go vet ./...

      - name: Test
        working-directory: services/bridge
        run: go test ./... -timeout 60s -race

  # ─── Rust face-bias-audit ────────────────────────────────────────────────────
  rust:
    name: Rust (build + test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/face-bias-audit

      - name: Check formatting
        working-directory: services/face-bias-audit
        run: cargo fmt --check

      - name: Clippy
        working-directory: services/face-bias-audit
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: services/face-bias-audit
        run: cargo build --release

      - name: Unit Tests
        working-directory: services/face-bias-audit
        run: cargo test --lib

      - name: Integration Smoke Tests
        working-directory: services/face-bias-audit
        env:
          BIAS_AUDIT_URL: http://localhost:8230
        run: cargo test --test smoke_test -- --nocapture

  # ─── Python face-biometric ───────────────────────────────────────────────────
  python:
    name: Python (lint + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio ruff
          pip install fastapi pydantic httpx aioredis redis

      - name: Lint with ruff
        run: ruff check services/face-biometric/ --ignore E501 || true

      - name: Run smoke tests
        run: |
          pip install pydantic zod-python || true
          python -m pytest tests/python/test_unit_all_workflows.py \
            -v --tb=short -x \
            --ignore=tests/python/test_unit_all_workflows.py \
            || python -m pytest tests/python/test_unit_all_workflows.py \
               -v --tb=short --ignore-glob="*test_integration*"

  # ─── Full smoke-test suite ───────────────────────────────────────────────────
  smoke:
    name: Smoke tests (all workflows)
    runs-on: ubuntu-latest
    needs: [typescript, go]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/bridge/go.sum

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Install Python test deps
        run: pip install pytest

      - name: Run full smoke suite
        run: |
          python -m pytest tests/python/test_unit_all_workflows.py \
            -v --tb=short

  # ─── Caddy edge proxy ────────────────────────────────────────────────────────
  caddy:
    name: Caddy (Dockerfile lint + Caddyfile validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Caddy Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/caddy/Dockerfile
          ignore: DL3008,DL3009,DL3015

      - name: Validate Caddyfile syntax
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/services/caddy/config:/etc/caddy \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile || true

  # ─── Docker Compose validation ───────────────────────────────────────────────
  docker-compose-validate:
    name: Docker Compose (validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  # ─── Dependency vulnerability scan ──────────────────────────────────────────
  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
