version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# NextHub Platform — Docker Compose
#
# Edge request flow:
#   Internet → Caddy (TLS/HTTP3/ACME) → OpenAppSec (WAF) → APISIX (routing)
#            → Keycloak (OIDC/JWT)    → NextHub / Bridge / Face Biometric
# ─────────────────────────────────────────────────────────────────────────────

networks:
  nexthub:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  temporal_data:
  kafka_data:
  keycloak_data:
  tigerbeetle_data:
  face_biometric_models:
  qdrant_data:
  caddy_data:
  caddy_config:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
    - nexthub
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: nexthub_db
    volumes:
    - postgres_data:/var/lib/postgresql/data
    ports:
    - 5432:5432
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U user -d nexthub_db
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
    - nexthub
    volumes:
    - redis_data:/data
    ports:
    - 6379:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    networks:
    - nexthub
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test:
      - CMD
      - bash
      - -c
      - echo ruok | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    networks:
    - nexthub
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
    - kafka_data:/var/lib/kafka/data
    ports:
    - 29092:29092
    healthcheck:
      test:
      - CMD
      - kafka-broker-api-versions
      - --bootstrap-server
      - localhost:9092
      interval: 15s
      timeout: 10s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24.2
    restart: unless-stopped
    networks:
    - nexthub
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: user
      POSTGRES_PWD: pass
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamicconfig.yaml
    volumes:
    - temporal_data:/etc/temporal
    ports:
    - 7233:7233
    healthcheck:
      test:
      - CMD
      - temporal
      - operator
      - cluster
      - health
      interval: 15s
      timeout: 10s
      retries: 10

  temporal-ui:
    image: temporalio/ui:2.26.2
    restart: unless-stopped
    networks:
    - nexthub
    depends_on:
    - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3001
    ports:
    - 8088:8080
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Identity & Auth ─────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    networks:
    - nexthub
    depends_on:
      postgres:
        condition: service_healthy
    # --import-realm auto-imports JSON files from /opt/keycloak/data/import
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/nexthub_db
      KC_DB_USERNAME: user
      KC_DB_PASSWORD: pass
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Required for Caddy reverse-proxy — Keycloak must know its public URL
      KC_HOSTNAME: ${NEXTHUB_AUTH_DOMAIN:-auth.paygate.ng}
      KC_HOSTNAME_STRICT: 'false'
      KC_PROXY: edge
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      KC_LOG_LEVEL: INFO
    volumes:
    - keycloak_data:/opt/keycloak/data
    # Mount realm JSON for --import-realm auto-import on first start
    - ./services/keycloak/realms:/opt/keycloak/data/import:ro
    ports:
    - 8180:8080
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8080/health/ready || exit 1
      interval: 20s
      timeout: 10s
      retries: 10

  # One-shot init container — sets client secrets and service-account roles
  # after Keycloak is healthy. Runs once and exits.
  keycloak-init:
    image: python:3.12-alpine
    restart: 'no'
    networks:
    - nexthub
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
    - ./services/keycloak:/scripts:ro
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-nexthub}
      BRIDGE_CLIENT_SECRET: ${BRIDGE_CLIENT_SECRET:-nexthub-bridge-secret}
      FACE_CLIENT_SECRET: ${FACE_CLIENT_SECRET:-nexthub-face-secret}
      CADDY_CLIENT_SECRET: ${CADDY_CLIENT_SECRET:-nexthub-caddy-secret}
      PORTAL_CLIENT_SECRET: ${PORTAL_CLIENT_SECRET:-nexthub-portal-secret}
    entrypoint: ["/bin/sh", "/scripts/init-keycloak.sh"]

  permify:
    image: ghcr.io/permify/permify:v0.9.6
    restart: unless-stopped
    networks:
    - nexthub
    command: serve
    environment:
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: postgres://user:pass@postgres:5432/nexthub_db?sslmode=disable
      PERMIFY_SERVER_HTTP_PORT: 3476
      PERMIFY_SERVER_GRPC_PORT: 3478
    ports:
    - 3476:3476
    - 3478:3478
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3476/healthz
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Core Services ───────────────────────────────────────────────────────────

  ledger:
    build:
      context: ./services/ledger
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
    - nexthub
    environment:
      LEDGER_PORT: '8090'
      LEDGER_DATA_DIR: /data/tigerbeetle
    volumes:
    - tigerbeetle_data:/data/tigerbeetle
    ports:
    - 8090:8090
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8090/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  bridge:
    build:
      context: ./services/bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
    - nexthub
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_healthy
      ledger:
        condition: service_healthy
    environment:
      BRIDGE_PORT: '8081'
      DATABASE_URL: postgres://user:pass@postgres:5432/nexthub_db?sslmode=disable
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      TEMPORAL_HOST: temporal:7233
      TEMPORAL_NAMESPACE: default
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: nexthub
      PERMIFY_URL: http://permify:3476
      LEDGER_URL: http://ledger:8090
      INTERNAL_API_KEY: ${NEXTHUB_INTEGRATION_API_KEY:-dev-integration-key}
      FACE_BIOMETRIC_URL: http://face-biometric:8220
      BIAS_AUDIT_SERVICE_URL: http://face-bias-audit:8230
      FACE_VERIFY_THRESHOLD: '0.40'
      FACE_LIVENESS_THRESHOLD: '0.60'
      FACE_QUALITY_MIN_SCORE: '0.50'
      # Caddy Admin API — bridge can reload Caddy config dynamically
      CADDY_ADMIN_URL: http://caddy:2019
    ports:
    - 8081:8081
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8081/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  lakehouse:
    build:
      context: ./services/lakehouse
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
    - nexthub
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LAKEHOUSE_PORT: '8082'
      DATABASE_URL: postgresql://user:pass@postgres:5432/nexthub_db
    ports:
    - 8082:8082
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8082/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: nexthub-qdrant
    restart: unless-stopped
    networks:
    - nexthub
    ports:
    - 6333:6333
    - 6334:6334
    volumes:
    - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:6333/healthz
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  face-bias-audit:
    build:
      context: ./services/face-bias-audit
      dockerfile: Dockerfile
    container_name: nexthub-face-bias-audit
    restart: unless-stopped
    networks:
    - nexthub
    ports:
    - 8230:8230
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/nexthub_db
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      BIAS_KAFKA_TOPIC: nexthub.face.bias.event.v1
      BIAS_AUDIT_PORT: '8230'
      FAR_ALERT_THRESHOLD: '0.10'
      BIAS_WINDOW_SECS: '3600'
      RUST_LOG: face_bias_audit=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:8230/health
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  face-biometric:
    build:
      context: ./services/face-biometric
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
    - nexthub
    ports:
    - 8220:8220
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      INSIGHTFACE_MODEL: buffalo_l
      FACE_VERIFY_THRESHOLD: '0.40'
      LIVENESS_THRESHOLD: '0.60'
      QUALITY_MIN_SCORE: '0.50'
      LIVENESS_MODEL_PATH: /app/models/silent_face_anti_spoof.onnx
      PORT: '8220'
      QDRANT_URL: http://qdrant:6333
      BIAS_AUDIT_SERVICE_URL: http://face-bias-audit:8230
    volumes:
    - face_biometric_models:/app/models
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      face-bias-audit:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:8220/health
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  nexthub:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
    - nexthub
    depends_on:
      postgres:
        condition: service_healthy
      bridge:
        condition: service_healthy
      lakehouse:
        condition: service_healthy
      face-biometric:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/nexthub_db
      JWT_SECRET: ${JWT_SECRET:-nexthub-dev-secret-32chars-minimum}
      REGULATOR_JWT_SECRET: ${REGULATOR_JWT_SECRET:-regulator-dev-secret-32chars}
      NEXTHUB_INTEGRATION_API_KEY: ${NEXTHUB_INTEGRATION_API_KEY:-dev-integration-key}
      PORT: '3001'
      MIDDLEWARE_BRIDGE_URL: http://bridge:8081
      MIDDLEWARE_INTERNAL_KEY: ${NEXTHUB_INTEGRATION_API_KEY:-dev-integration-key}
      LAKEHOUSE_URL: http://lakehouse:8082
      REDIS_URL: redis://redis:6379
      FACE_BIOMETRIC_URL: http://face-biometric:8220
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: nexthub
      KEYCLOAK_CLIENT_ID: nexthub-portal
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
    ports:
    - 3001:3001
    - 50051:50051
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:3001/api/trpc || exit 1
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Edge Proxy ──────────────────────────────────────────────────────────────
  # Caddy is the outermost entry point for all internet traffic.
  # It handles TLS termination (ACME/Let's Encrypt), HTTP/3 (QUIC),
  # OpenAppSec WAF attachment, and reverse-proxies to APISIX and Keycloak.
  caddy:
    build:
      context: ./services/caddy
      dockerfile: Dockerfile
    container_name: nexthub-caddy
    restart: unless-stopped
    networks:
    - nexthub
    depends_on:
      nexthub:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
    - '80:80'
    - '443:443'
    - '443:443/udp'
    - '2019:2019'
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-ops@nexthub.io}
      NEXTHUB_DOMAIN: ${NEXTHUB_DOMAIN:-hub.paygate.ng}
      NEXTHUB_API_DOMAIN: ${NEXTHUB_API_DOMAIN:-api.paygate.ng}
      NEXTHUB_GRPC_DOMAIN: ${NEXTHUB_GRPC_DOMAIN:-grpc.paygate.ng}
      NEXTHUB_AUTH_DOMAIN: ${NEXTHUB_AUTH_DOMAIN:-auth.paygate.ng}
      NEXTHUB_UPSTREAM: http://nexthub:3001
      APISIX_UPSTREAM: http://apisix:9080
      KEYCLOAK_UPSTREAM: http://keycloak:8080
      NEXTHUB_GRPC_UPSTREAM: nexthub:50051
      OPENAPPSEC_SOCKET: /run/appsec.sock
      APPSEC_LOG_LEVEL: ${APPSEC_LOG_LEVEL:-info}
    volumes:
    - caddy_data:/data/caddy
    - caddy_config:/config/caddy
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:2019/config/
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
