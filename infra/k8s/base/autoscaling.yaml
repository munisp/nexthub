---
# autoscaling.yaml — HPA + VPA for all NextHub services
# ─────────────────────────────────────────────────────────────────────────────
# HPA (Horizontal Pod Autoscaler): scales pod count based on CPU/memory/custom metrics
# VPA (Vertical Pod Autoscaler): right-sizes resource requests automatically
# KEDA (Kubernetes Event-Driven Autoscaling): scales on Kafka lag for consumers

# ── nexthub-core (Node.js API) ────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexthub-core-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexthub-core
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "500"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300    # 5-min cooldown before scale-down
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: nexthub-core-vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexthub-core
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: nexthub-core
        minAllowed:
          cpu: "200m"
          memory: "256Mi"
        maxAllowed:
          cpu: "4000m"
          memory: "4Gi"
---
# ── go-bridge (Go middleware) ─────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-bridge-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-bridge
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 180
---
# ── fraud-scoring (Rust gRPC) ─────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-scoring-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraud-scoring
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# ── kafka-consumer (Kafka DLQ + event processor) ──────────────────────────────
# KEDA ScaledObject: scale consumer pods based on Kafka consumer group lag
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: nexthub-kafka-consumer-scaledobject
spec:
  scaleTargetRef:
    name: nexthub-kafka-consumer
  minReplicaCount: 1
  maxReplicaCount: 20
  cooldownPeriod: 120
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-headless:9092
        consumerGroup: nexthub-core-consumer
        topic: nexthub.transfers.v1
        lagThreshold: "100"          # scale up if lag > 100 messages per partition
        offsetResetPolicy: latest
    - type: kafka
      metadata:
        bootstrapServers: kafka-headless:9092
        consumerGroup: nexthub-core-consumer
        topic: nexthub.settlement.v1
        lagThreshold: "50"
---
# ── grpc-health-server ────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grpc-health-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexthub-grpc-health
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
# ── settlement-engine (Rust) ──────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: settlement-engine-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: settlement-engine
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
